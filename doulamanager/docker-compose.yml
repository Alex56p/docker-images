version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: doula-db
    env_file:
      - ../stack.env
    environment:
      POSTGRES_USER: doula
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: doula_manager
    ports:
      - "5433:5432"
    volumes:
      - /mnt/data/doulamanager/database:/var/lib/postgresql/data

  app:
    image: doula-manager:latest
    container_name: doula-app
    ports:
      - "5005:3000"
    env_file:
      - ../stack.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
    depends_on:
      - db
